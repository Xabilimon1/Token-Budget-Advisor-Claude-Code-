<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0e1826"/>
    </linearGradient>
    <radialGradient id="lglow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ltba" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="lb1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="lb2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#a16207" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="lb3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="lb4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#lbg)" rx="48"/>
  <ellipse cx="200" cy="168" rx="185" ry="155" fill="url(#lglow)"/>
  <rect width="400" height="400" fill="none" stroke="#1e293b" stroke-width="1.5" rx="48"/>

  <!-- % labels above bars -->
  <text x="107" y="208" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#4ade80" opacity="0.7">25%</text>
  <text x="169" y="153" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#facc15" opacity="0.7">50%</text>
  <text x="231" y="98"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#fb923c" opacity="0.7">75%</text>
  <text x="293" y="53"  text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#f87171" opacity="0.7">100%</text>

  <!-- Bars: w=44, gap=18 → total=230, start=(400-230)/2=85, bottom=275 -->
  <rect x="85"  y="220" width="44" height="55"  rx="7" fill="url(#lb1)" opacity="0.90"/>
  <rect x="147" y="165" width="44" height="110" rx="7" fill="url(#lb2)" opacity="0.90"/>
  <rect x="209" y="110" width="44" height="165" rx="7" fill="url(#lb3)" opacity="0.90"/>
  <rect x="271" y="65"  width="44" height="210" rx="7" fill="url(#lb4)" opacity="0.90"/>

  <!-- Baseline -->
  <rect x="68" y="277" width="264" height="1.5" fill="#1e293b"/>

  <!-- TBA -->
  <text x="200" y="334"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="54" font-weight="900" fill="url(#ltba)"
    text-anchor="middle" letter-spacing="-1">TBA</text>

  <!-- Tagline -->
  <text x="200" y="366"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11.5" font-weight="500" fill="#475569"
    text-anchor="middle" letter-spacing="3.2">TOKEN BUDGET ADVISOR</text>
</svg>

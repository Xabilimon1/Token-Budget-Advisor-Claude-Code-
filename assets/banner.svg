<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0e1826"/>
    </linearGradient>

    <!-- TBA title gradient: orange to amber -->
    <linearGradient id="tba-grad" x1="80" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Top accent line -->
    <linearGradient id="accent-line" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="45%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle glow orb behind bars -->
    <radialGradient id="glow-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Bar gradients (objectBoundingBox = default) -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#a16207" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1e293b"/>
    </pattern>

    <!-- Clip the rounded corners -->
    <clipPath id="rounded">
      <rect width="1280" height="360" rx="14"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="360" fill="url(#bg)" rx="14"/>

  <!-- Dot texture — right half only -->
  <rect x="620" y="0" width="660" height="360" fill="url(#dots)" opacity="0.35" clip-path="url(#rounded)"/>

  <!-- Glow orb -->
  <ellipse cx="1055" cy="175" rx="270" ry="210" fill="url(#glow-orb)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent-line)" clip-path="url(#rounded)"/>

  <!-- ─── LEFT SECTION ─────────────────────────────── -->

  <!-- "TBA" large -->
  <text x="80" y="192"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="134" font-weight="900"
    fill="url(#tba-grad)"
    letter-spacing="-3">TBA</text>

  <!-- Thin separator -->
  <rect x="80" y="212" width="520" height="1" fill="#1e293b"/>

  <!-- "Token Budget Advisor" -->
  <text x="80" y="254"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="30" font-weight="600"
    fill="#e2e8f0" letter-spacing="0.4">Token Budget Advisor</text>

  <!-- "for Claude Code · Skill" -->
  <text x="82" y="293"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" font-weight="400"
    fill="#64748b" letter-spacing="0.8">for Claude Code  ·  Skill</text>

  <!-- Tagline -->
  <text x="82" y="334"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" font-weight="400"
    fill="#2d3f55" letter-spacing="0.3">Choose your depth. Control your tokens. Before Claude responds.</text>

  <!-- ─── RIGHT SECTION: Depth bars ────────────────── -->

  <!-- Section label -->
  <text x="1050" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="600"
    fill="#334155" text-anchor="middle"
    letter-spacing="3">DEPTH LEVELS</text>

  <!-- Baseline -->
  <rect x="852" y="308" width="400" height="1" fill="#1e293b"/>

  <!-- Bar 1 — 25% Essential (height 60) -->
  <rect x="872" y="248" width="58" height="60" rx="7" fill="url(#g1)" opacity="0.88"/>
  <text x="901" y="239" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" font-weight="700" fill="#4ade80">25%</text>
  <text x="901" y="326" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#475569">Essential</text>

  <!-- Bar 2 — 50% Moderate (height 110) -->
  <rect x="952" y="198" width="58" height="110" rx="7" fill="url(#g2)" opacity="0.88"/>
  <text x="981" y="189" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" font-weight="700" fill="#facc15">50%</text>
  <text x="981" y="326" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#475569">Moderate</text>

  <!-- Bar 3 — 75% Detailed (height 160) -->
  <rect x="1032" y="148" width="58" height="160" rx="7" fill="url(#g3)" opacity="0.88"/>
  <text x="1061" y="139" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" font-weight="700" fill="#fb923c">75%</text>
  <text x="1061" y="326" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#475569">Detailed</text>

  <!-- Bar 4 — 100% Exhaustive (height 228) -->
  <rect x="1112" y="80" width="58" height="228" rx="7" fill="url(#g4)" opacity="0.88"/>
  <text x="1141" y="71" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" font-weight="700" fill="#f87171">100%</text>
  <text x="1141" y="326" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#475569">Exhaustive</text>

  <!-- Outer border -->
  <rect width="1280" height="360" fill="none" stroke="#1a2535" stroke-width="1" rx="14"/>
</svg>
